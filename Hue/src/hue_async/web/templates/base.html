<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hue Control Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
    }
    header {
      background: #111827;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    main {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .button.secondary {
      background: #374151;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0b1220;
      color: #e5e7eb;
      margin-top: 6px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .status-on { color: #4ade80; }
    .status-off { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <div><strong>Hue Control Portal</strong></div>
    <div>
      {% if user %}
        Logged in as {{ user }} |
        <a href="/logout">Logout</a>
      {% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
